<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 320'><style>.z{stroke:#cbd5e1;stroke-width:2;rx:14}.t{font:700 24px Inter,Arial,sans-serif;fill:#0f172a}.s{font:500 15px Inter,Arial,sans-serif;fill:#334155}</style><rect class='z' x='20' y='30' width='300' height='260' fill='#f0fdf4'/><text class='t' x='170' y='70' text-anchor='middle'>Allowed Support</text><text class='s' x='40' y='110'>• Explain concepts</text><text class='s' x='40' y='138'>• Ask Socratic questions</text><text class='s' x='40' y='166'>• Encourage revision</text><rect class='z' x='350' y='30' width='300' height='260' fill='#fffbeb'/><text class='t' x='500' y='70' text-anchor='middle'>Needs Human Review</text><text class='s' x='370' y='110'>• Grading decisions</text><text class='s' x='370' y='138'>• Curriculum overrides</text><text class='s' x='370' y='166'>• Escalated uncertainty</text><rect class='z' x='680' y='30' width='300' height='260' fill='#fef2f2'/><text class='t' x='830' y='70' text-anchor='middle'>Not Allowed</text><text class='s' x='700' y='110'>• Do student work</text><text class='s' x='700' y='138'>• Bypass parent visibility</text><text class='s' x='700' y='166'>• Collect sensitive data</text></svg>
