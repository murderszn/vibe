  <line class='arrow' x1='1000' y1='125' x2='1060' y2='125'/>
  <rect class='box' x='1060' y='70' width='130' height='110'/><text class='txt' x='1125' y='118' text-anchor='middle'>Portfolio</text><text class='sub' x='1125' y='145' text-anchor='middle'>Review loop</text>
</svg>
